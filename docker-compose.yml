services:
  postgres:
    image: postgres:16-alpine
    container_name: haksan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-haksan}
      POSTGRES_USER: ${POSTGRES_USER:-haksan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-haksan_dev_pwd}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - haksan_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-haksan} -d ${POSTGRES_DB:-haksan}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: haksan-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - haksan_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: haksan-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb -p local/erp-product-images || true;
      mc mb -p local/erp-quote-documents || true;
      mc mb -p local/erp-proforma-documents || true;
      mc mb -p local/erp-contract-documents || true;
      mc mb -p local/erp-invoice-documents || true;
      mc mb -p local/erp-stock-documents || true;
      mc mb -p local/erp-service-documents || true;
      mc mb -p local/erp-import-raw || true;
      mc anonymous set download local/erp-product-images || true;
      exit 0;
      "

  mailhog:
    image: mailhog/mailhog:latest
    container_name: haksan-mailhog
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"

volumes:
  haksan_postgres_data:
  haksan_minio_data:
